name: update data

on:
  # 手动触发工作流
  workflow_dispatch:
    inputs:
      item:
        description: 'Choose a game or all'
        type: choice
        default: 'all'
        options:
          - 'gi'
          - 'hsr'
          - 'zzz'
          - 'all'
  # 定时执行：每周四 UTC 时间 0 点（北京时间早上 8 点）
  schedule:
    - cron: '0 0 * * 4'
  # 推送触发：当代码被推送到仓库时
  push:
    branches:
      - main

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Build
        run: npm install -g pnpm && pnpm install --no-frozen-lockfile

      # 步骤3：预定义提交信息（规避 YAML 表达式语法错误）
      - name: Set commit message
        id: set-msg
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            # 定时触发：固定提交信息
            echo "COMMIT_MSG=weekly update: all game gacha data" >> $GITHUB_ENV
          elif [ "${{ github.event_name }}" = "push" ]; then
            # 推送触发：固定提交信息
            echo "COMMIT_MSG=auto update: all game gacha data on push" >> $GITHUB_ENV
          else
            # 手动触发：根据输入参数生成信息
            ITEM="${{ github.event.inputs.item }}"
            if [ -z "$ITEM" ]; then
              echo "COMMIT_MSG=update all game gacha data" >> $GITHUB_ENV
            else
              echo "COMMIT_MSG=update $ITEM game gacha data" >> $GITHUB_ENV
            fi
          fi

      - name: Get Gacha Data
        # 定时任务调度时使用空参数（处理所有游戏），手动触发时使用输入的参数
        env:
          MIHOYO_COOKIE: ${{ secrets.MIHOYO_COOKIE }}
          MIHOYO_GI_COOKIE: ${{ secrets.MIHOYO_GI_COOKIE }}
          MIHOYO_HSR_COOKIE: ${{ secrets.MIHOYO_HSR_COOKIE }}
          MIHOYO_3Z_COOKIE: ${{ secrets.MIHOYO_3Z_COOKIE }}
          MIHOYO_DEVICE_ID: ${{ secrets.MIHOYO_DEVICE_ID }}
          MIHOYO_DEVICE_FP: ${{ secrets.MIHOYO_DEVICE_FP }}
        run: |
          node src/mihoyo.js ${{ github.event.inputs.item || '' }} 
          node src/miyoushe.js ${{ github.event.inputs.item || '' }} 
          node src/fetchGachaDataV2.js ${{ github.event.inputs.item || '' }}

      - name: Update Data
        uses: EndBug/add-and-commit@v9
        with:
          add: 'data/'
          default_author: github_actions
          # 定时任务提交信息使用固定文本，手动触发使用输入参数
          message: ${{ env.COMMIT_MSG }}  # 使用预定义的提交信息

